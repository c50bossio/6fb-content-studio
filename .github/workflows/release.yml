name: Build & Release (macOS)

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mac:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node ────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 3. Import Developer ID cert from secret ────────────────────
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the p12
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to use it without prompting
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      # ── 4. Build + sign ────────────────────────────────────────────
      - name: Build (electron-vite)
        run: npm run build

      - name: Package macOS (signed)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: ${{ runner.temp }}/build.keychain
        run: npx electron-builder --mac --publish never

      # ── 5. Notarize ────────────────────────────────────────────────
      - name: Zip app for notarization
        run: |
          ditto -c -k --keepParent \
            "release/mac-arm64/6FB Content Studio.app" \
            /tmp/notarize.zip

      - name: Submit to Apple notary service
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit /tmp/notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      # ── 6. Staple ──────────────────────────────────────────────────
      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "release/mac-arm64/6FB Content Studio.app"

      # ── 7. Build final DMG ─────────────────────────────────────────
      - name: Build notarized DMG
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}
          hdiutil create \
            -volname "6FB Content Studio" \
            -srcfolder "release/mac-arm64/6FB Content Studio.app" \
            -ov -format UDZO \
            -o "release/6FB Content Studio-${VERSION}-arm64.dmg"
          xcrun stapler staple "release/6FB Content Studio-${VERSION}-arm64.dmg"
          echo "DMG_PATH=release/6FB Content Studio-${VERSION}-arm64.dmg" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # ── 8. Publish to GitHub Releases ──────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "6FB Content Studio v${{ env.VERSION }}"
          body: |
            ## 6FB Content Studio v${{ env.VERSION }}

            **Signed & notarized — opens without any security prompt on macOS.**

            ### Install
            1. Download the `.dmg` below
            2. Drag **6FB Content Studio** to Applications
            3. Double-click — opens immediately, no warnings

            ### First-time setup
            Settings → 6FB Account → sign in → Sync Instagram
          files: |
            ${{ env.DMG_PATH }}
          token: ${{ secrets.GH_TOKEN }}
